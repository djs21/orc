# orc tmux configuration — loaded on server creation via:
#   _orc_tmux -f "$_ORC_ROOT/lib/orc-tmux.conf" new-session -d -s orc -n _orc_init
#
# This file contains ONLY static options that don't depend on runtime config.
# Dynamic options (theme colors, keybindings, status bars) are applied by
# _tmux_ensure_session() via _orc_tmux after the server is created.
#
# Since this file is loaded via -f on server creation, all settings are
# scoped to the orc tmux server only — nothing leaks to the default server.

# ── Terminal ──────────────────────────────────────────────────────────────────
set-option -g default-terminal "screen-256color"

# ── Functional settings ──────────────────────────────────────────────────────
set-option -g history-limit 50000
set-option -g alternate-screen off
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g allow-rename off
set-option -g monitor-activity on
set-option -g visual-activity off
set-option -g pane-border-status top
set-option -g status-interval 10

# ── Pane borders ─────────────────────────────────────────────────────────────
set-option -g pane-border-format " #{pane_title} "
set-option -g pane-border-lines single
set-option -g pane-border-indicators colour

# ── Popup borders ─────────────────────────────────────────────────────────────
set-option -g popup-border-lines rounded
